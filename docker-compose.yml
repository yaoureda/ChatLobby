version: "3.9"

services:
  db:
    image: postgres:16
    container_name: chatlobby-db
    environment:
      POSTGRES_DB: chatlobbydb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: chatlobby-app
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/chatlobbydb
      SPRING_DATASOURCE_USERNAME: chatuser
      SPRING_DATASOURCE_PASSWORD: chatpass
    ports:
      - "8080:8080"

volumes:
  postgres_data: