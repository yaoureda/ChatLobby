<!DOCTYPE html>
<html>
<head>
    <title>ChatLobby</title>
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>ChatLobby</h2>
        <p>Logged in as: <strong id="current-user">loading...</strong></p>
    </div>

    <div class="chat-controls">
        <select id="room"></select>
        <button onclick="subscribeToRoom()">Join Room</button>
    </div>

    <ul id="messages" class="messages-list"></ul>

    <div class="chat-input-area">
        <input id="message" placeholder="Write a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    async function loadRooms() {
        try {
            const response = await fetch('/chatrooms/all');
            const rooms = await response.json();

            const roomSelect = document.getElementById('room');
            roomSelect.innerHTML = '';

            rooms.forEach(room => {
                const option = document.createElement('option');
                option.value = room;
                option.textContent = formatRoomName(room);
                roomSelect.appendChild(option);
            });
        } catch (error) {
            console.error('Failed to load chat rooms:', error);
        }
    }

    function formatRoomName(room) {
        return room.charAt(0) + room.slice(1).toLowerCase();
    }

    window.addEventListener('DOMContentLoaded', loadRooms);
</script>
<script src="/js/chat.js"></script>

</body>
</html>
