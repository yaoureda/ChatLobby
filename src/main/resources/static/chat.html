<!DOCTYPE html>

<html>
<head>
    <title>Chat Test</title>
</head>
<body>
<h2>WebSocket Chat Test</h2>

<input id="sender" placeholder="Your name"/>
<input id="message" placeholder="Message"/>
<input id="room" placeholder="Room name" value="general"/>
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let currentSubscription = null;

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log("Connected");
            subscribeToRoom();
        });
    }

    function subscribeToRoom() {
        const room = document.getElementById('room').value;

        if (currentSubscription) {
            currentSubscription.unsubscribe();
        }

        document.getElementById("messages").innerHTML = "";

        currentSubscription = stompClient.subscribe('/topic/rooms/' + room, function (message) {
            const msg = JSON.parse(message.body);
            showMessage(msg);
        });

        loadMessagesForRoom(room);
    }

    function loadMessagesForRoom(room) {
        fetch('/messages/room/' + room)
            .then(res => res.json())
            .then(data => {
                data.forEach(msg => showMessage(msg));
            });
    }

    function sendMessage() {
        const sender = document.getElementById('sender').value;
        const content = document.getElementById('message').value;
        const room = document.getElementById('room').value;

        stompClient.send("/app/chat.send", {}, JSON.stringify({
            sender: sender,
            content: content,
            room: room
        }));

        document.getElementById('message').value = '';
    }

    function showMessage(msg) {
        const li = document.createElement("li");

        const time = msg.createdAt ? new Date(msg.createdAt).toLocaleString() : "";
        li.textContent = `[${time}] ${msg.sender}: ${msg.content}`;

        document.getElementById("messages").appendChild(li);
    }

    function loadMessages() {
        const messagesList = document.getElementById("messages");
        messagesList.innerHTML = "";

        fetch('/messages')
            .then(res => res.json())
            .then(data => {
                data.forEach(msg => showMessage(msg));
            });
    }

    connect();
</script>

</body>
</html>
